name: Beta Release

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      base_version:
        description: Stable semver base for the beta, for example 1.1.0
        required: false
        type: string

permissions:
  contents: write

jobs:
  beta-release:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BETA_BASE_VERSION: ${{ inputs.base_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate release secrets
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
        run: |
          test -n "$CSC_LINK" || (echo "Missing MAC_CERTIFICATE secret." && exit 1)
          test -n "$CSC_KEY_PASSWORD" || (echo "Missing MAC_CERTIFICATE_PASSWORD secret." && exit 1)
          test -n "$APPLE_API_KEY_B64" || (echo "Missing APPLE_API_KEY_B64 secret." && exit 1)
          test -n "$APPLE_API_KEY_ID" || (echo "Missing APPLE_API_KEY_ID secret." && exit 1)
          test -n "$APPLE_API_ISSUER" || (echo "Missing APPLE_API_ISSUER secret." && exit 1)
          test -n "$APPLE_TEAM_ID" || (echo "Missing APPLE_TEAM_ID secret." && exit 1)

      - name: Prepare notarization key
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          python3 - <<'PY' > "$KEY_PATH"
          import base64
          import os
          import sys
          sys.stdout.buffer.write(base64.b64decode(os.environ["APPLE_API_KEY_B64"]))
          PY
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          echo "NOTARIZE=true" >> "$GITHUB_ENV"

      - name: Compute beta version
        run: node scripts/compute-beta-version.cjs

      - name: Parser tests
        run: npm run test:parser

      - name: Release config checks
        run: npm run test:release-config

      - name: Publish beta prerelease
        run: npm run publish:beta
