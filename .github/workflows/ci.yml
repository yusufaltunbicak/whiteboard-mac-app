name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'feature/**'

permissions:
  contents: read

jobs:
  test-build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Parser tests
        run: npm run test:parser

      - name: Release config checks
        run: npm run test:release-config

      - name: Renderer build
        run: npm run build
